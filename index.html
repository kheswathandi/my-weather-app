<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;900&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Roboto:wdth,wght@75..100,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/style.css" />
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>

    <title>My weather application</title>
  </head>
  <body>
    <div class="container">
      <header>
        <form id="search-form">
          <input
            type="search"
            placeholder="Enter a city.."
            required
            class="search-city"
            id="search-input"
          />

          <input type="submit" value="Search" class="search-button" />
        </form>
      </header>
      <br />
      <hr />
      <main>
        <div class="current-weather">
          <div>
            <h1 id="cities">Paris</h1>

            <p>
              <span id="date"> Saturday 15:32</span>, moderate rain <br />
              Humidity:
              <strong>87%</strong>
              , Wind:
              <strong>7.2km/h</strong>
            </p>
          </div>
          <div class="temperature">
            <span class="emoji">☀️</span>
            <span class="value" id="temperature">24</span>
            <span class="unit">°C</span>
          </div>
        </div>
      </main>

      <hr />
      <br />
      <footer>
        <p>
          This project was coded by
          <a href="#" target="_blank">Thandiwe Kheswa</a> and is
          <a
            href="https://github.com/kheswathandi/my-weather-app/tree/master"
            target="_blank"
            >on GitHub</a
          >
          and
          <a href="#" target="_blank">hosted on Netlify</a>
        </p>
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
